<form action="/calculate" method="post" id="calcForm">
    <div class="inputs">
        <input type="number" name="a" placeholder="Birinci ədəd"
               th:value="${a}" step="any" required>
        <input type="number" name="b" placeholder="İkinci ədəd"
               th:value="${b}" step="any" required>
    </div>

    <input type="hidden" name="op" id="hiddenOp" value="add">

    <div class="buttons">
        <button type="button" onclick="setOp('add')"
                class="btn-op" th:classappend="${op == 'add'} ? 'active'" id="btn-add">+</button>
        <button type="button" onclick="setOp('subtract')"
                class="btn-op" th:classappend="${op == 'subtract'} ? 'active'" id="btn-subtract">−</button>
        <button type="button" onclick="setOp('multiply')"
                class="btn-op" th:classappend="${op == 'multiply'} ? 'active'" id="btn-multiply">×</button>
        <button type="button" onclick="setOp('divide')"
                class="btn-op" th:classappend="${op == 'divide'} ? 'active'" id="btn-divide">÷</button>
    </div>

    <button type="submit" class="btn-equals">= Hesabla</button>
</form>

<script>
    function setOp(op) {
        document.getElementById('hiddenOp').value = op;
        ['add','subtract','multiply','divide'].forEach(o => {
            document.getElementById('btn-' + o).classList.remove('active');
        });
        document.getElementById('btn-' + op).classList.add('active');
    }

    // Səhifə yüklənəndə əvvəlki seçimi göstər
    window.onload = function() {
        const current = document.getElementById('hiddenOp').value;
        if(current) setOp(current);
    }
</script>
